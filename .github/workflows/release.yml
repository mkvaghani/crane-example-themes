name: Release

on:
  workflow_dispatch:
    inputs:
      theme:
        description: 'Theme to deploy'
        required: true
        default: 'casual-clothes-template'
        type: choice
        options:
          - casual-clothes-template

permissions:
  contents: read

jobs:
  validate:
    name: Validate Theme
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate theme
        uses: ./.github/actions/validate-theme
        with:
          working-directory: ${{ inputs.theme }}

  deploy:
    name: Deploy Theme
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.theme }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.theme }}
        run: npm ci

      - name: Create crane.config.json
        working-directory: ${{ inputs.theme }}
        run: |
          cat > crane.config.json << EOF
          {
            "appClientId": "${{ vars.APP_CLIENT_ID }}",
            "appSecretKey": "${{ secrets.APP_SECRET_KEY }}"
          }
          EOF

      - name: Deploy theme
        working-directory: ${{ inputs.theme }}
        run: npm run deploy

      - name: Notify Slack
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Theme deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *Theme Deployment ${{ job.status }}*\n\n*Theme:* ${{ inputs.theme }}\n*Repository:* ${{ github.repository }}\n*Triggered by:* ${{ github.actor }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                  }
                }
              ]
            }

